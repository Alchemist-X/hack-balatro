<html lang="zh-CN">

<style>
:root {
  --bg: #071018;
  --panel: #0f1b29;
  --panel-2: #132536;
  --line: #20384d;
  --text: #e6f1ff;
  --muted: #7f9bb3;
  --accent: #ffb938;
  --good: #40d08c;
  --bad: #ff6666;
  --chip: #64d0ff;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: "SF Pro Display", "Segoe UI", sans-serif;
  background: radial-gradient(circle at top, #10263a 0%, var(--bg) 50%);
  color: var(--text);
}
.wrap {
  max-width: 1280px;
  margin: 0 auto;
  padding: 20px;
}
.hero, .panel {
  background: rgba(15, 27, 41, 0.92);
  border: 1px solid var(--line);
  border-radius: 16px;
  box-shadow: 0 20px 50px rgba(0, 0, 0, 0.28);
}
.hero {
  padding: 18px 20px;
  display: flex;
  gap: 16px;
  align-items: center;
  justify-content: space-between;
}
.hero h1 {
  margin: 0;
  font-size: 22px;
  letter-spacing: 0.06em;
}
.hero .meta {
  color: var(--muted);
  font-size: 13px;
}
.loader {
  margin: 24px 0;
  padding: 48px 24px;
  border: 2px dashed var(--line);
  text-align: center;
  color: var(--muted);
  cursor: pointer;
}
.loader strong {
  color: var(--accent);
}
.grid {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 16px;
}
.col {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.panel {
  padding: 16px 18px;
}
.panel h2 {
  margin: 0 0 12px;
  font-size: 12px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
}
.controls {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}
button, input[type="range"] {
  accent-color: var(--accent);
}
button {
  border: 1px solid var(--line);
  background: var(--panel-2);
  color: var(--text);
  border-radius: 10px;
  padding: 8px 12px;
  cursor: pointer;
}
.locale-switch {
  display: inline-flex;
  gap: 6px;
  padding-right: 4px;
}
.locale-btn.active {
  border-color: var(--accent);
  color: var(--accent);
}
.score {
  display: flex;
  gap: 24px;
  align-items: baseline;
}
.score .value {
  font-size: 42px;
  font-weight: 800;
}
.score .required {
  color: var(--muted);
}
.progress {
  height: 14px;
  background: #0b141d;
  border-radius: 999px;
  overflow: hidden;
  border: 1px solid var(--line);
}
.progress > span {
  display: block;
  height: 100%;
  background: linear-gradient(90deg, var(--chip), var(--accent));
}
.badge-row, .card-row, .joker-row, .event-list {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.badge {
  border: 1px solid var(--line);
  background: var(--panel-2);
  border-radius: 999px;
  padding: 6px 10px;
  font-size: 12px;
}
.badge.good { color: var(--good); }
.badge.bad { color: var(--bad); }
.card, .joker {
  min-width: 84px;
  padding: 10px;
  border-radius: 12px;
  background: linear-gradient(180deg, #173149, #122434);
  border: 1px solid var(--line);
}
.art {
  width: 71px;
  height: 95px;
  border-radius: 10px;
  background-repeat: no-repeat;
  background-size: auto;
  margin-bottom: 8px;
  border: 1px solid rgba(255,255,255,0.08);
}
.card.selected {
  border-color: var(--accent);
  transform: translateY(-2px);
}
.card .mini, .joker .mini {
  font-size: 11px;
  color: var(--muted);
}
.card .label, .joker .label {
  margin-top: 4px;
  font-weight: 700;
}
.event {
  width: 100%;
  padding: 10px 12px;
  border-radius: 12px;
  border: 1px solid var(--line);
  background: #102031;
}
.event .stage {
  color: var(--accent);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.stat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.stat {
  padding: 12px;
  border-radius: 12px;
  border: 1px solid var(--line);
  background: #102031;
}
.stat .name {
  color: var(--muted);
  font-size: 11px;
  text-transform: uppercase;
}
.stat .value {
  margin-top: 4px;
  font-size: 24px;
  font-weight: 700;
}
.decision-log {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.log-headline {
  font-size: 18px;
  font-weight: 700;
}
.log-block strong {
  display: block;
  margin-bottom: 4px;
  color: var(--muted);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.log-block p {
  margin: 0;
  line-height: 1.5;
}
.metric-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.metric {
  border: 1px solid var(--line);
  background: #102031;
  border-radius: 10px;
  padding: 8px 10px;
  font-size: 12px;
}
.metric .name {
  color: var(--muted);
  display: block;
  margin-bottom: 4px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  font-size: 10px;
}
@media (max-width: 900px) {
  .grid { grid-template-columns: 1fr; }
}
</style>

<body>
<div class="wrap">
  <div class="hero">
    <div>
      <h1>Balatro Native Replay</h1>
      <div class="meta" id="meta">Drop a replay JSON generated by <code>scripts/record_replay.py</code></div>
    </div>
    <div class="controls">
      <div class="locale-switch">
        <button id="localeEn" class="locale-btn" onclick="setLocale('en')">EN</button>
        <button id="localeZh" class="locale-btn" onclick="setLocale('zh')">ZH</button>
      </div>
      <button onclick="prevStep()">Prev</button>
      <button id="playBtn" onclick="togglePlay()">Play</button>
      <button onclick="nextStep()">Next</button>
      <input type="range" id="scrub" min="0" max="0" value="0" oninput="seek(+this.value)">
    </div>
  </div>

  <label class="loader hero" id="loader">
    <input id="fileInput" type="file" accept=".json" style="display:none">
    <div>拖放或点击这里加载 <strong>replay.json</strong></div>
  </label>

  <div id="app" class="grid" style="display:none">
    <div class="col">
      <div class="panel">
        <h2>Run State</h2>
        <div class="score">
          <div class="value" id="scoreValue">0</div>
          <div class="required">/ <span id="requiredValue">0</span></div>
        </div>
        <div class="progress"><span id="scoreBar" style="width:0%"></span></div>
        <div class="badge-row" id="phaseBadges"></div>
      </div>

      <div class="panel">
        <h2>Cards</h2>
        <div class="card-row" id="hand"></div>
      </div>

      <div class="panel">
        <h2>Jokers</h2>
        <div class="joker-row" id="jokers"></div>
      </div>

      <div class="panel">
        <h2>Shop</h2>
        <div class="joker-row" id="shop"></div>
      </div>

      <div class="panel">
        <h2>Activation Chain</h2>
        <div class="event-list" id="events"></div>
      </div>
    </div>

    <div class="col">
      <div class="panel">
        <h2>Step</h2>
        <div class="stat-grid">
          <div class="stat"><div class="name">Transition</div><div class="value" id="stepValue">0</div></div>
          <div class="stat"><div class="name">Action</div><div class="value" id="actionValue">-</div></div>
          <div class="stat"><div class="name">Stage</div><div class="value" id="stageValue">-</div></div>
          <div class="stat"><div class="name">Blind</div><div class="value" id="blindValue">-</div></div>
          <div class="stat"><div class="name">Ante</div><div class="value" id="anteValue">1</div></div>
          <div class="stat"><div class="name">Stake</div><div class="value" id="stakeValue">1</div></div>
          <div class="stat"><div class="name">Hands</div><div class="value" id="playsValue">4</div></div>
          <div class="stat"><div class="name">Discards</div><div class="value" id="discardsValue">3</div></div>
          <div class="stat"><div class="name">Money</div><div class="value" id="moneyValue">4</div></div>
          <div class="stat"><div class="name">Deck</div><div class="value" id="deckValue">52</div></div>
        </div>
      </div>

      <div class="panel">
        <h2>Decision Log</h2>
        <div id="decisionLog" class="decision-log"></div>
      </div>
    </div>
  </div>
</div>

<script>
let replay = null;
let current = 0;
let timer = null;
let locale = "en";

const loader = document.getElementById("loader");
const fileInput = document.getElementById("fileInput");

loader.addEventListener("click", () => fileInput.click());
loader.addEventListener("dragover", (event) => {
  event.preventDefault();
  loader.style.borderColor = "var(--accent)";
});
loader.addEventListener("dragleave", () => {
  loader.style.borderColor = "var(--line)";
});
loader.addEventListener("drop", (event) => {
  event.preventDefault();
  loader.style.borderColor = "var(--line)";
  if (event.dataTransfer.files[0]) {
    readReplay(event.dataTransfer.files[0]);
  }
});
fileInput.addEventListener("change", (event) => {
  if (event.target.files[0]) {
    readReplay(event.target.files[0]);
  }
});

function readReplay(file) {
  const reader = new FileReader();
  reader.onload = (event) => {
    hydrateReplay(JSON.parse(event.target.result));
  };
  reader.readAsText(file);
}

function hydrateReplay(data) {
  replay = data;
  current = 0;
  locale = window.localStorage.getItem("balatroReplayLocale")
    || replay?.log_metadata?.default_locale
    || "en";
  const startedAt = replay?.test_metadata?.started_at ? ` · ${replay.test_metadata.started_at}` : "";
  document.getElementById("meta").textContent =
    `${replay.engine} · ${replay.version} · seed ${replay.seed} · ${replay.transitions.length} transitions${startedAt}`;
  document.getElementById("scrub").max = Math.max(0, replay.transitions.length - 1);
  loader.style.display = "none";
  document.getElementById("app").style.display = "grid";
  renderLocaleButtons();
  render();
  if (window.__AUTO_PLAY__) {
    togglePlay();
  }
}

function setLocale(nextLocale) {
  locale = nextLocale;
  window.localStorage.setItem("balatroReplayLocale", nextLocale);
  renderLocaleButtons();
  render();
}

function renderLocaleButtons() {
  document.getElementById("localeEn").classList.toggle("active", locale === "en");
  document.getElementById("localeZh").classList.toggle("active", locale === "zh");
}

function togglePlay() {
  const button = document.getElementById("playBtn");
  if (timer) {
    clearInterval(timer);
    timer = null;
    button.textContent = "Play";
    return;
  }
  button.textContent = "Pause";
  timer = setInterval(() => {
    if (!replay || current >= replay.transitions.length - 1) {
      togglePlay();
      return;
    }
    nextStep();
  }, 600);
}

function prevStep() {
  if (!replay) return;
  current = Math.max(0, current - 1);
  render();
}

function nextStep() {
  if (!replay) return;
  current = Math.min(replay.transitions.length - 1, current + 1);
  render();
}

function seek(index) {
  current = index;
  render();
}

function renderCard(card, selectedIds) {
  const label = `${rankLabel(card.rank)} ${suitLabel(card.suit)}`;
  const selected = selectedIds.has(card.card_id) ? " selected" : "";
  return `<div class="card${selected}">
    <div class="mini">#${card.card_id}</div>
    <div class="label">${label}</div>
    <div class="mini">${card.enhancement || "Base"} · ${card.edition || "Std"} · ${card.seal || "No Seal"}</div>
  </div>`;
}

function renderJoker(joker) {
  const sprite = replay?.sprite_index?.jokers?.[joker.joker_id];
  const art = renderSprite(sprite);
  return `<div class="joker">
    ${art}
    <div class="mini">${joker.joker_id}</div>
    <div class="label">${joker.name || joker.joker_name || "Joker"}</div>
    <div class="mini">$${joker.cost ?? joker.joker_cost} · rarity ${joker.rarity ?? joker.joker_rarity}</div>
  </div>`;
}

function render() {
  if (!replay || replay.transitions.length === 0) return;
  const transition = replay.transitions[current];
  const snapshot = transition.snapshot_after;
  document.getElementById("scrub").value = current;

  const ratio = snapshot.required_score > 0 ? Math.min(100, snapshot.score / snapshot.required_score * 100) : 0;
  document.getElementById("scoreValue").textContent = snapshot.score;
  document.getElementById("requiredValue").textContent = snapshot.required_score;
  document.getElementById("scoreBar").style.width = `${ratio}%`;

  const badges = [
    badge(`phase ${snapshot.phase}`, ""),
    badge(`boss ${snapshot.boss_effect || "None"}`, snapshot.boss_effect && snapshot.boss_effect !== "None" ? "good" : ""),
    badge(snapshot.won ? "win" : snapshot.over ? "run over" : "in run", snapshot.won ? "good" : snapshot.over ? "bad" : ""),
    renderBlindBadge(snapshot.blind_name),
  ];
  document.getElementById("phaseBadges").innerHTML = badges.join("");

  document.getElementById("stepValue").textContent = `${current + 1}/${replay.transitions.length}`;
  document.getElementById("actionValue").textContent = transition.action.name;
  document.getElementById("stageValue").textContent = snapshot.stage;
  document.getElementById("blindValue").textContent = snapshot.blind_name;
  document.getElementById("anteValue").textContent = snapshot.ante;
  document.getElementById("stakeValue").textContent = snapshot.stake;
  document.getElementById("playsValue").textContent = snapshot.plays;
  document.getElementById("discardsValue").textContent = snapshot.discards;
  document.getElementById("moneyValue").textContent = `$${snapshot.money}`;
  document.getElementById("deckValue").textContent = snapshot.deck.length;

  const selectedIds = new Set(snapshot.selected.map((card) => card.card_id));
  document.getElementById("hand").innerHTML = snapshot.available.map((card) => renderCard(card, selectedIds)).join("");
  document.getElementById("jokers").innerHTML = snapshot.jokers.length ? snapshot.jokers.map(renderJoker).join("") : `<div class="badge">No Jokers</div>`;
  document.getElementById("shop").innerHTML = snapshot.shop_jokers.length ? snapshot.shop_jokers.map(renderJoker).join("") : `<div class="badge">No Shop Offers</div>`;
  document.getElementById("events").innerHTML = transition.events.length ? transition.events.map((event) => `
    <div class="event">
      <div class="stage">${event.stage}</div>
      <div><strong>${event.kind}</strong></div>
      <div>${event.summary}</div>
    </div>
  `).join("") : `<div class="badge">No events</div>`;
  renderDecisionLog(transition);
}

function badge(text, className) {
  return `<span class="badge ${className}">${text}</span>`;
}

function metric(label, value) {
  return `<span class="metric"><span class="name">${escapeHtml(label)}</span>${escapeHtml(String(value))}</span>`;
}

function escapeHtml(value) {
  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll("\"", "&quot;");
}

function localizedLabels() {
  return locale === "zh"
    ? {
        reason: "原因",
        outcome: "结果",
        predictedHand: "Predicted Hand",
        selectedCards: "Selected Cards",
        scoreDelta: "Score",
        moneyDelta: "Money",
        handCount: "Hands",
        discardCount: "Discards",
        elapsed: "Elapsed",
        testFocus: "Test Focus",
        noDecision: "这个 replay 没有内置的 decision_log，下面展示 action 和 event 的回退摘要。",
      }
    : {
        reason: "Reason",
        outcome: "Outcome",
        predictedHand: "Predicted Hand",
        selectedCards: "Selected Cards",
        scoreDelta: "Score",
        moneyDelta: "Money",
        handCount: "Hands",
        discardCount: "Discards",
        elapsed: "Elapsed",
        testFocus: "Test Focus",
        noDecision: "This replay does not include a decision_log. Falling back to raw action and event summaries.",
      };
}

function fallbackDecisionLog(transition) {
  const labels = localizedLabels();
  const eventSummary = transition.events.length
    ? transition.events.map((event) => event.summary).join("; ")
    : (locale === "zh" ? "没有 event summary。" : "No event summary recorded.");
  return {
    headline: locale === "zh"
      ? `执行 ${transition.action.name}。`
      : `Execute ${transition.action.name}.`,
    reason: labels.noDecision,
    outcome: eventSummary,
    context: {},
    rationaleTags: [],
  };
}

function renderDecisionLog(transition) {
  const labels = localizedLabels();
  const log = transition.decision_log;
  const body = log ? (log[locale] || log.en || fallbackDecisionLog(transition)) : fallbackDecisionLog(transition);
  const context = log?.context || {};
  const tags = log?.rationale_tags || [];
  const metrics = [];
  if (context.predicted_hand) {
    metrics.push(metric(labels.predictedHand, context.predicted_hand));
  }
  if (context.selected_cards && context.selected_cards.length) {
    metrics.push(metric(labels.selectedCards, context.selected_cards.join(", ")));
  }
  if (context.score_before != null && context.score_after != null) {
    metrics.push(metric(labels.scoreDelta, `${context.score_before} -> ${context.score_after}`));
  }
  if (context.money_before != null && context.money_after != null) {
    metrics.push(metric(labels.moneyDelta, `$${context.money_before} -> $${context.money_after}`));
  }
  if (context.plays_before != null && context.plays_after != null) {
    metrics.push(metric(labels.handCount, `${context.plays_before} -> ${context.plays_after}`));
  }
  if (context.discards_before != null && context.discards_after != null) {
    metrics.push(metric(labels.discardCount, `${context.discards_before} -> ${context.discards_after}`));
  }
  if (transition.elapsed_ms != null) {
    metrics.push(metric(labels.elapsed, `${transition.elapsed_ms} ms`));
  }
  if (replay?.test_metadata?.test_focus?.length) {
    metrics.push(metric(labels.testFocus, replay.test_metadata.test_focus.join(", ")));
  }
  document.getElementById("decisionLog").innerHTML = `
    <div class="log-headline">${escapeHtml(body.headline)}</div>
    <div class="log-block">
      <strong>${escapeHtml(labels.reason)}</strong>
      <p>${escapeHtml(body.reason)}</p>
    </div>
    <div class="log-block">
      <strong>${escapeHtml(labels.outcome)}</strong>
      <p>${escapeHtml(body.outcome)}</p>
    </div>
    ${metrics.length ? `<div class="metric-row">${metrics.join("")}</div>` : ""}
    ${tags.length ? `<div class="badge-row">${tags.map((tag) => badge(tag, "")).join("")}</div>` : ""}
  `;
}

function renderBlindBadge(blindName) {
  const sprite = replay?.sprite_index?.blinds_by_name?.[blindName];
  if (!sprite) return badge(`blind ${blindName}`, "");
  return `<span class="badge">
    <span style="display:inline-flex;align-items:center;gap:8px">
      ${renderSprite(sprite, 32, 32)}
      blind ${blindName}
    </span>
  </span>`;
}

function renderSprite(sprite, width = 71, height = 95) {
  if (!sprite || !replay?.asset_root) return "";
  const atlas = `${replay.asset_root}${sprite.atlas}`;
  const posX = -(sprite.x * sprite.frame_w);
  const posY = -(sprite.y * sprite.frame_h);
  return `<div class="art" style="
      width:${width}px;
      height:${height}px;
      background-image:url('${encodeURI(atlas)}');
      background-position:${posX}px ${posY}px;
      background-size:auto;
  "></div>`;
}

function rankLabel(rank) {
  return String(rank)
    .replace("Two", "2")
    .replace("Three", "3")
    .replace("Four", "4")
    .replace("Five", "5")
    .replace("Six", "6")
    .replace("Seven", "7")
    .replace("Eight", "8")
    .replace("Nine", "9")
    .replace("Ten", "10")
    .replace("Jack", "J")
    .replace("Queen", "Q")
    .replace("King", "K")
    .replace("Ace", "A");
}

function suitLabel(suit) {
  return {
    Spades: "♠",
    Hearts: "♥",
    Diamonds: "♦",
    Clubs: "♣",
  }[suit] || suit;
}

if (window.__REPLAY__) {
  hydrateReplay(window.__REPLAY__);
}
</script>
